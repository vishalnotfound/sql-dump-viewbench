<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Dump Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #1a1a1a; color: #ddd; }
        .row { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: #222; border-right: 1px solid #444; padding: 16px; flex-shrink: 0; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 24px; overflow: auto; }
        h6 { color: #888; margin: 0 0 8px 0; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .upload-box { margin-bottom: 16px; }
        .upload-box input { width: 100%; padding: 8px; background: #333; border: 1px solid #444; color: #fff; border-radius: 4px; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #0d6efd; color: #fff; width: 100%; margin-top: 8px; }
        .btn-primary:hover { background: #0b5ed7; }
        .file-list { list-style: none; padding: 0; margin: 0; flex: 1; overflow-y: auto; }
        .file-item { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .file-item:hover { background: #2d2d2d; }
        .file-item.active { background: #0d6efd; }
        .file-item .name { font-size: 14px; word-break: break-all; }
        .empty { color: #666; font-size: 13px; padding: 10px 0; text-align: center; }
        .table-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
        .table-card { background: #252525; border: 1px solid #444; border-radius: 6px; padding: 16px; display: flex; flex-direction: column; justify-content: space-between; }
        .table-card h5 { margin: 0 0 12px 0; font-size: 14px; color: #fff; word-break: break-all; }
        .table-card .pk-info { font-size: 12px; color: #f39c12; margin-bottom: 12px; min-height: 14px; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-outline { background: transparent; border: 1px solid #666; color: #ccc; }
        .btn-outline:hover { background: #333; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #444; white-space: nowrap; }
        th { background: #252525; position: sticky; top: 0; font-weight: 600; }
        tr:hover { background: #2d2d2d; }
        .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding: 12px; background: #222; border-radius: 4px; }
        .breadcrumb { margin-bottom: 16px; color: #888; display: flex; justify-content: space-between; align-items: center; }
        .breadcrumb span { color: #fff; }
        .toast-container { position: fixed; bottom: 16px; right: 16px; z-index: 1000; }
        .toast { background: #dc3545; color: #fff; padding: 12px 20px; border-radius: 4px; margin-top: 8px; animation: fadeIn 0.3s; }
        .toast.success { background: #198754; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .tabs { display: flex; border-bottom: 1px solid #444; margin-bottom: 16px; }
        .tab { padding: 10px 20px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; }
        .tab:hover { color: #ccc; }
        .tab.active { color: #fff; border-bottom: 2px solid #0d6efd; }
        .search-bar { width: 100%; padding: 10px 14px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; margin-bottom: 16px; font-size: 14px; }
        .search-bar:focus { outline: none; border-color: #0d6efd; }
        #mermaid-container { background: #eee; border-radius: 6px; padding: 20px; text-align: center; overflow: auto; min-height: 400px; }
    </style>
</head>
<body>
    <div class="row">
        <div class="sidebar">
            <h6>SQL Files</h6>
            <div class="upload-box">
                <input type="file" id="file-upload" accept=".sql">
                <button class="btn btn-primary" onclick="uploadFile()">Upload</button>
            </div>
            <ul class="file-list" id="file-list">
                <li class="empty">No files</li>
            </ul>
        </div>
        <div class="main" id="main">
            <div id="welcome" style="text-align: center; padding-top: 100px;">
                <div style="font-size: 48px; color: #444;">&#128451;</div>
                <h3 style="color: #666;">Upload or select a SQL file</h3>
            </div>
            
            <div id="file-view" style="display: none;">
                <div class="breadcrumb">
                    <div>File: <span id="current-file"></span></div>
                </div>
                
                <div class="tabs" id="main-tabs">
                    <div class="tab active" onclick="switchTab('tables')" id="tab-btn-tables">Tables</div>
                    <div class="tab" onclick="switchTab('visualize')" id="tab-btn-visualize">Visualize</div>
                </div>
                
                <div id="tab-tables">
                    <input type="text" class="search-bar" id="table-search" placeholder="Search tables by name..." onkeyup="filterTables()">
                    <div id="tables-container"></div>
                </div>
                
                <div id="tab-visualize" style="display: none;">
                    <div id="mermaid-container"></div>
                </div>
            </div>

            <div id="data-view" style="display: none;">
                <div class="breadcrumb">
                    <div>
                        <a href="#" onclick="backToTables()" style="color: #888; text-decoration: none;">&larr; Back</a>
                        &nbsp;&nbsp; Table: <span id="current-table"></span>
                    </div>
                </div>
                <div style="overflow-x: auto; border: 1px solid #444; border-radius: 6px;">
                    <table id="data-table">
                        <thead id="data-head"></thead>
                        <tbody id="data-body"></tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>
    <div class="toast-container" id="toasts"></div>
    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'default' });

        let currentFile = null;
        let currentTable = null;
        let currentSchema = [];
        let page = 1;
        const pageSize = 50;

        function toast(msg, type) {
            const el = document.createElement('div');
            el.className = 'toast ' + (type || '');
            el.textContent = msg;
            document.getElementById('toasts').appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        async function loadFiles() {
            try {
                const res = await fetch('/api/files');
                const files = await res.json();
                const list = document.getElementById('file-list');
                list.innerHTML = '';
                if (!files.length) {
                    list.innerHTML = '<li class="empty">No files</li>';
                    return;
                }
                files.forEach(f => {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.id = 'file-' + f.name;
                    li.innerHTML = '<span class="name">' + f.name + '</span>';
                    li.onclick = () => selectFile(f.name);
                    list.appendChild(li);
                });
            } catch (e) {
                toast('Failed to load files', 'error');
            }
        }

        async function uploadFile() {
            const input = document.getElementById('file-upload');
            if (!input.files.length) { toast('Select a file', 'error'); return; }
            const form = new FormData();
            form.append('file', input.files[0]);
            try {
                const res = await fetch('/api/files/upload', { method: 'POST', body: form });
                if (!res.ok) throw new Error('Upload failed');
                toast('Uploaded!', 'success');
                input.value = '';
                loadFiles();
            } catch (e) {
                toast('Upload failed', 'error');
            }
        }

        async function selectFile(name) {
            currentFile = name;
            document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById('file-' + name);
            if(activeEl) activeEl.classList.add('active');

            document.getElementById('welcome').style.display = 'none';
            document.getElementById('data-view').style.display = 'none';
            document.getElementById('file-view').style.display = 'block';
            document.getElementById('current-file').textContent = name;
            document.getElementById('table-search').value = '';
            
            switchTab('tables');

            try {
                const res = await fetch('/api/files/' + name + '/tables');
                currentSchema = await res.json();
                renderTableCards();
            } catch (e) {
                toast('Failed to load tables', 'error');
            }
        }
        
        function renderTableCards() {
            const container = document.getElementById('tables-container');
            if (!currentSchema.length) {
                container.innerHTML = '<div class="empty" style="text-align: left;">No tables found</div>';
                return;
            }
            let html = '<div class="table-grid" id="table-grid-inner">';
            currentSchema.forEach(t => {
                let pkText = t.primary_keys && t.primary_keys.length > 0 ? `🔑 PK: ${t.primary_keys.join(', ')}` : '';
                html += `<div class="table-card" data-name="${t.name.toLowerCase()}">
                            <div>
                                <h5>&#128202; ${t.name}</h5>
                                <div class="pk-info">${pkText}</div>
                            </div>
                            <button class="btn btn-sm btn-outline" onclick="selectTable('${t.name}')">View Data</button>
                         </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function filterTables() {
            const query = document.getElementById('table-search').value.toLowerCase();
            const cards = document.querySelectorAll('.table-card');
            cards.forEach(card => {
                if (card.getAttribute('data-name').includes(query)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function switchTab(tab) {
            document.getElementById('tab-btn-tables').classList.remove('active');
            document.getElementById('tab-btn-visualize').classList.remove('active');
            document.getElementById('tab-tables').style.display = 'none';
            document.getElementById('tab-visualize').style.display = 'none';

            document.getElementById('tab-btn-' + tab).classList.add('active');
            document.getElementById('tab-' + tab).style.display = 'block';

            if (tab === 'visualize') {
                renderMermaid();
            }
        }

        async function renderMermaid() {
            const container = document.getElementById('mermaid-container');
            if (!currentSchema || currentSchema.length === 0) {
                container.innerHTML = '<div style="color: #666; margin-top: 50px;">No tables to visualize</div>';
                return;
            }

            let diagram = 'erDiagram\n';
            currentSchema.forEach(t => {
                if (t.foreign_keys && t.foreign_keys.length > 0) {
                    t.foreign_keys.forEach(fk => {
                        diagram += `    ${t.name} ||--o{ ${fk.to_table} : references\n`;
                    });
                } else {
                    diagram += `    ${t.name} {\n    }\n`;
                }
            });

            container.innerHTML = `<div class="mermaid">${diagram}</div>`;
            try {
                await mermaid.run({ querySelector: '.mermaid' });
            } catch (err) {
                console.error("Mermaid rendering failed:", err);
                container.innerHTML = '<div style="color: red; margin-top: 50px;">Failed to render diagram.</div>';
            }
        }

        async function selectTable(name) {
            currentTable = name;
            page = 1;
            document.getElementById('file-view').style.display = 'none';
            document.getElementById('data-view').style.display = 'block';
            document.getElementById('current-table').textContent = name;
            loadData();
        }

        async function loadData() {
            if (!currentFile || !currentTable) return;
            try {
                const url = '/api/files/' + currentFile + '/table/' + currentTable + '?page=' + page + '&page_size=' + pageSize;
                const res = await fetch(url);
                const data = await res.json();
                const head = document.getElementById('data-head');
                const body = document.getElementById('data-body');
                
                let h = '<tr>';
                data.columns.forEach(c => {
                    let icon = c.is_pk ? ' <span title="Primary Key" style="color:#f39c12">🔑</span>' : '';
                    h += `<th>${c.name}${icon}</th>`;
                });
                h += '</tr>';
                head.innerHTML = h;
                
                let b = '';
                data.rows.forEach(r => {
                    b += '<tr>';
                    data.columns.forEach(c => { 
                        let val = r[c.name] != null ? r[c.name] : '<span style="color:#666">NULL</span>';
                        b += '<td>' + val + '</td>'; 
                    });
                    b += '</tr>';
                });
                body.innerHTML = b;
                
                const start = data.total_rows > 0 ? (data.page - 1) * data.page_size + 1 : 0;
                const end = Math.min(data.page * data.page_size, data.total_rows);
                document.getElementById('pagination').innerHTML =
                    '<div style="color: #888;">Showing ' + start + ' to ' + end + ' of ' + data.total_rows + ' rows</div>' +
                    '<div>' +
                        '<button class="btn btn-sm btn-outline" ' + (data.page <= 1 ? 'disabled' : '') + ' onclick="changePage(-1)">&laquo; Prev</button>' +
                        '<button class="btn btn-sm btn-outline" ' + (data.page >= data.total_pages ? 'disabled' : '') + ' onclick="changePage(1)" style="margin-left: 8px;">Next &raquo;</button>' +
                    '</div>';
            } catch (e) {
                toast('Failed to load data', 'error');
            }
        }

        function changePage(d) { page += d; loadData(); }
        function backToTables() { 
            document.getElementById('data-view').style.display = 'none'; 
            document.getElementById('file-view').style.display = 'block'; 
            currentTable = null; 
        }

        document.addEventListener('DOMContentLoaded', loadFiles);
    </script>
</body>
</html>
