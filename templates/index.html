<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Dump Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-database me-2"></i> SQL Dump Explorer
            </a>
            <div class="d-flex gap-2">
                <button id="btn-refresh" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-clockwise"></i> Refresh
                </button>
                <button id="btn-toggle-theme" class="btn btn-outline-secondary">
                    <i class="bi bi-moon-stars"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid p-0">
        <div class="d-flex" style="height: calc(100vh - 56px);">
            <!-- Sidebar -->
            <div id="sidebar" class="border-end border-secondary bg-dark-subtle"
                style="width: 300px; overflow-y: auto;">
                <div class="p-3">
                    <div class="mb-3">
                        <h6 class="text-secondary mb-2">
                            <i class="bi bi-folder2"></i> SQL Files
                        </h6>
                        <!-- Upload Section -->
                        <div class="mb-3">
                            <input type="file" id="file-upload"
                                class="form-control form-control-sm bg-dark text-light border-secondary" accept=".sql">
                            <button id="btn-upload" class="btn btn-primary btn-sm w-100 mt-2">
                                <i class="bi bi-upload"></i> Upload SQL File
                            </button>
                        </div>
                        <div id="file-list" class="list-group list-group-flush">
                            <!-- Files will be loaded here -->
                        </div>
                    </div>
                    <div class="mb-3" id="table-section" style="display: none;">
                        <h6 class="text-secondary mb-2">
                            <i class="bi bi-table"></i> Tables
                        </h6>
                        <div id="table-list" class="list-group list-group-flush">
                            <!-- Tables will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div id="main-content" class="flex-grow-1 overflow-auto p-4">
                <div id="welcome-message" class="text-center py-5">
                    <i class="bi bi-database-gear display-1 text-secondary"></i>
                    <h3 class="mt-3">Select a SQL file to begin</h3>
                    <p class="text-secondary">Your SQL dumps will appear in the sidebar</p>
                </div>

                <div id="database-info" style="display: none;">
                    <!-- Database info will be loaded here -->
                </div>

                <div id="table-view" style="display: none;">
                    <!-- Table view will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Toasts -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="toast-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>

</html>
